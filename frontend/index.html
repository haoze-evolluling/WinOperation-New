<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinOperation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/registry.css">
    <link rel="stylesheet" href="/css/cleanup.css">
    <link rel="stylesheet" href="/css/performance.css">
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <div class="logo">WinOperation</div>
            <ul class="nav-menu">
                <li class="nav-item active" data-panel="dashboard">仪表盘</li>
                <li class="nav-item" data-panel="system-info">系统详情</li>
                <li class="nav-item" data-panel="cleanup">存储清理</li>
                <li class="nav-item" data-panel="performance">服务管理</li>
                <li class="nav-item" data-panel="registry">注册表</li>
            </ul>
            <button class="theme-toggle" id="themeToggle" title="切换主题" aria-label="切换主题">
                <span class="theme-icon sun">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </span>
                <span class="theme-icon moon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </span>
            </button>
        </nav>
        <main class="content">
            <div id="loading-bar" class="loading-bar"><div class="loading-bar-thumb"></div></div>
            <!-- 仪表盘 -->
            <section id="panel-dashboard" class="panel">
                <h2>仪表盘</h2>
                <div id="dashboard-content"></div>
            </section>

            <!-- 系统详情 -->
            <section id="panel-system-info" class="panel">
                <h2>系统详情</h2>
                <div id="system-info-content"></div>
            </section>

            <!-- 存储清理 -->
            <section id="panel-cleanup" class="panel">
                <h2>存储清理</h2>
                <div class="cleanup-actions glass">
                    <button class="btn btn-primary" onclick="doScanCleanup()">重新扫描</button>
                    <button class="btn btn-danger" onclick="doCleanupSelected()" id="cleanup-execute-btn" disabled>清理选中项</button>
                </div>
                <div id="cleanup-categories" class="cleanup-categories glass"></div>
                <div id="cleanup-result" class="result-area"></div>
            </section>

            <!-- 服务管理 -->
            <section id="panel-performance" class="panel">
                <h2>服务管理</h2>
                <div id="performance-content"></div>
                <div id="performance-result" class="result-area"></div>
            </section>

            <!-- 注册表 -->
            <section id="panel-registry" class="panel">
                <h2>注册表操作</h2>
                <button class="reg-sidebar-toggle" onclick="toggleRegSidebar()">切换目录树</button>
                <div class="reg-layout">
                    <div class="reg-sidebar glass" id="reg-sidebar">
                        <div class="reg-sidebar-label">注册表目录</div>
                        <div class="form-group">
                            <input type="text" id="reg-tree-path" placeholder="路径 (如 HKCU\Software)" value="HKCU">
                            <button class="btn btn-secondary btn-sm" onclick="goUpRegTree()" title="返回上一级">&#8593;</button>
                            <button class="btn btn-secondary btn-sm" onclick="loadRegTree()">加载</button>
                        </div>
                        <div id="reg-tree" class="reg-tree"></div>
                    </div>
                    <div class="reg-main">
                        <div class="reg-toolbar glass">
                            <button class="btn btn-primary" onclick="refreshRegValues()">刷新</button>
                            <button class="btn btn-success" onclick="showRegWriteForm()">新建/修改值</button>
                            <button class="btn btn-secondary" onclick="exportCurrentReg()">导出 .reg</button>
                            <button class="btn btn-secondary" onclick="importRegFile()">导入 .reg</button>
                            <input type="file" id="reg-import-file" accept=".reg" style="display:none" onchange="doImportReg(event)">
                        </div>
                        <div id="reg-path-display" class="reg-path-display glass">HKCU</div>
                        <div class="table-scroll">
                        <table class="table">
                            <thead><tr><th>名称</th><th>类型</th><th>数据</th><th>操作</th></tr></thead>
                            <tbody id="reg-values-body"></tbody>
                        </table>
                        </div>
                        <div id="reg-write-form" class="reg-write-form glass" style="display:none">
                            <input type="text" id="reg-write-key" placeholder="键名">
                            <select id="reg-write-type" onchange="updateWriteFormHint()">
                                <option value="REG_SZ">REG_SZ</option>
                                <option value="REG_DWORD">REG_DWORD</option>
                                <option value="REG_BINARY">REG_BINARY</option>
                            </select>
                            <input type="text" id="reg-write-value" placeholder="值">
                            <button class="btn btn-primary" onclick="writeReg()">写入</button>
                            <button class="btn btn-sm" onclick="hideRegWriteForm()">取消</button>
                        </div>
                    </div>
                </div>
                <div id="registry-result" class="result-area"></div>
            </section>
        </main>
    </div>
    <script src="/js/dashboard.js"></script>
    <script src="/js/system-info.js"></script>
    <script src="/js/cleanup.js"></script>
    <script src="/js/performance.js"></script>
    <script src="/js/registry.js"></script>
    <script src="/animation/animations.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
